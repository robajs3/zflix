{% extends "base.html" %}
{% block title %}Logowanie — Zflix{% endblock %}
{% block body_class %}page-auth{% endblock %}
{% block content %}
<div class="auth-screen">
  <div class="auth-card">
    <a href="/zflix/" class="brand brand--auth">ZFLIX</a>
    <h1>Zaloguj się</h1>
    <p class="auth-card__subtitle">Wpisz dane, żeby wrócić do oglądania.</p>

    <form method="post" class="auth-form">
      <label class="field">
        <span>Nazwa użytkownika lub e-mail</span>
        <input type="text" name="identifier" required autofocus autocomplete="username">
      </label>

      <label class="field">
        <span>Hasło</span>
        <input type="password" name="password" required autocomplete="current-password">
      </label>

      <label class="checkbox-field">
        <input type="checkbox" name="remember">
        <span>Zapamiętaj mnie</span>
      </label>

      <button type="submit" class="btn btn--primary btn--block">Zaloguj</button>
    </form>

    <p class="auth-card__footer">
      Nie masz konta? <a href="{{ url_for('auth.register') }}">Zarejestruj się kodem zaproszenia</a>
    </p>
  </div>
</div>
{% endblock %}
